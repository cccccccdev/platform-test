<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      const segmentCount = 1;
      const location = window.location;
      const base = location.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/';
      const rest = location.pathname
        .split('/')
        .slice(1 + segmentCount)
        .join('/')
        .replace(/&/g, '~and~');
      const search = location.search ? '&' + location.search.slice(1).replace(/&/g, '~and~') : '';
      location.replace(base + '?/' + rest + search + location.hash);
    </script>
  </head>
  <body></body>
</html>
