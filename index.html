  <body>
    <div id="root"></div>
    <script>
      // Restore route from GitHub Pages SPA redirect (https://github.com/rafgraph/spa-github-pages)
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
  </body>
